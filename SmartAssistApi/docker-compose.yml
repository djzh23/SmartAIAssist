services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_VOICE_ES=${ELEVENLABS_VOICE_ES:-JBFqnCBsd6RMkjVDRZzb}
      - ELEVENLABS_VOICE_DEFAULT=${ELEVENLABS_VOICE_DEFAULT:-JBFqnCBsd6RMkjVDRZzb}
      - UPSTASH__RESTURL=${UPSTASH_REST_URL}
      - UPSTASH__RESTTOKEN=${UPSTASH_REST_TOKEN}
      - FRONTEND__BASEURL=${FRONTEND_BASE_URL}
      - FRONTEND__SUCCESSURL=${FRONTEND_SUCCESS_URL}
      - FRONTEND__CANCELURL=${FRONTEND_CANCEL_URL}
      - FRONTEND__PORTALRETURNURL=${FRONTEND_PORTAL_RETURN_URL}
      - STRIPE__SECRETKEY=${STRIPE_SECRET_KEY}
      - STRIPE__PUBLISHABLEKEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE__WEBHOOKSECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE__PREMIUMPRICEID=${STRIPE_PREMIUM_PRICE_ID}
      - STRIPE__PROPRICEID=${STRIPE_PRO_PRICE_ID}
      - STRIPE__ENABLEDEBUGENDPOINT=${STRIPE_ENABLE_DEBUG_ENDPOINT:-false}
      - DATABASE_URL=${DATABASE_URL}
      - DOTNET_SYSTEM_NET_DISABLEIPV6=${DOTNET_SYSTEM_NET_DISABLEIPV6:-1}
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ASPNETCORE_URLS=http://+:8080
    restart: unless-stopped
