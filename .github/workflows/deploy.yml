name: Build, Test & Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore SmartAssistApi.sln

      - name: Build
        run: dotnet build SmartAssistApi.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test SmartAssistApi.sln --no-build --configuration Release --verbosity normal --logger "console;verbosity=detailed"
        continue-on-error: true

  deploy:
    name: Deploy to Render
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render deploy hook
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          echo "Render response: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ] && [ "$HTTP_STATUS" != "202" ]; then
            echo "Deploy hook returned unexpected status: $HTTP_STATUS"
            exit 1
          fi
          echo "Deploy triggered successfully."
